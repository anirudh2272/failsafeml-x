<svg width="1600" height="520" viewBox="0 0 1600 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="520" fill="white"/>

  <text x="800" y="55" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#111">
    FailSafeML-X: Model-Agnostic ML Reliability Layer
  </text>

  <text x="800" y="95" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#333">
    Prediction auditing, failure diagnosis, repair routing, and safe automation control
  </text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111"/>
    </marker>
  </defs>

  <!-- Boxes -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="17" fill="#111">
    <rect x="40" y="180" width="160" height="90" rx="12" fill="#f8fafc" stroke="#111" stroke-width="2"/>
    <text x="120" y="215" text-anchor="middle" font-weight="700">Input Data</text>
    <text x="120" y="242" text-anchor="middle">Features</text>

    <rect x="230" y="180" width="160" height="90" rx="12" fill="#f8fafc" stroke="#111" stroke-width="2"/>
    <text x="310" y="215" text-anchor="middle" font-weight="700">Baseline</text>
    <text x="310" y="242" text-anchor="middle">ML Model</text>

    <rect x="420" y="180" width="175" height="90" rx="12" fill="#f8fafc" stroke="#111" stroke-width="2"/>
    <text x="507" y="212" text-anchor="middle" font-weight="700">Prediction</text>
    <text x="507" y="239" text-anchor="middle">Prob / Interval</text>

    <rect x="625" y="180" width="190" height="90" rx="12" fill="#eef6ff" stroke="#111" stroke-width="2"/>
    <text x="720" y="204" text-anchor="middle" font-weight="700">Reliability Audit</text>
    <text x="720" y="230" text-anchor="middle">Calibration</text>
    <text x="720" y="254" text-anchor="middle">Uncertainty</text>

    <rect x="845" y="180" width="175" height="90" rx="12" fill="#eef6ff" stroke="#111" stroke-width="2"/>
    <text x="932" y="212" text-anchor="middle" font-weight="700">Drift / OOD</text>
    <text x="932" y="239" text-anchor="middle">Detection</text>

    <rect x="1050" y="180" width="190" height="90" rx="12" fill="#fff7ed" stroke="#111" stroke-width="2"/>
    <text x="1145" y="204" text-anchor="middle" font-weight="700">Failure Taxonomy</text>
    <text x="1145" y="230" text-anchor="middle">Failure IDs</text>
    <text x="1145" y="254" text-anchor="middle">Trust Score</text>

    <rect x="1270" y="180" width="175" height="90" rx="12" fill="#f0fdf4" stroke="#111" stroke-width="2"/>
    <text x="1357" y="204" text-anchor="middle" font-weight="700">Repair Engine</text>
    <text x="1357" y="230" text-anchor="middle">Abstain / Review</text>
    <text x="1357" y="254" text-anchor="middle">Retrain</text>

    <rect x="700" y="345" width="210" height="90" rx="12" fill="#f5f3ff" stroke="#111" stroke-width="2"/>
    <text x="805" y="378" text-anchor="middle" font-weight="700">RL-Style Router</text>
    <text x="805" y="405" text-anchor="middle">Cost-Sensitive</text>

    <rect x="1030" y="345" width="220" height="90" rx="12" fill="#fafafa" stroke="#111" stroke-width="2"/>
    <text x="1140" y="378" text-anchor="middle" font-weight="700">API + Dashboard</text>
    <text x="1140" y="405" text-anchor="middle">FastAPI / Streamlit</text>
  </g>

  <!-- Arrows top row -->
  <line x1="200" y1="225" x2="230" y2="225" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="225" x2="420" y2="225" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="595" y1="225" x2="625" y2="225" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="815" y1="225" x2="845" y2="225" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1020" y1="225" x2="1050" y2="225" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="1240" y1="225" x2="1270" y2="225" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Down and output arrows -->
  <line x1="1357" y1="270" x2="850" y2="345" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="910" y1="390" x2="1030" y2="390" stroke="#111" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="800" y="485" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#333">
    Goal: detect unreliable predictions before automation and route risky cases through safer actions.
  </text>
</svg>
