services:
  failsafemlx-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app/src
  failsafemlx-dashboard:
    build: .
    command: streamlit run apps/streamlit_dashboard.py --server.address 0.0.0.0 --server.port 8501
    ports:
      - "8501:8501"
    environment:
      - PYTHONPATH=/app/src
